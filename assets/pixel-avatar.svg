<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="128" height="128" shape-rendering="crispEdges">
  <!-- Hat brim (red) -->
  <rect x="2" y="2" width="12" height="2" fill="#e52222"/>
  <!-- Hat top (red) -->
  <rect x="3" y="0" width="10" height="2" fill="#e52222"/>
  <!-- Face (peach) -->
  <rect x="3" y="4" width="10" height="5" fill="#f5c07a"/>
  <!-- Eyes -->
  <rect x="5" y="5" width="2" height="2" fill="#3b1a08"/>
  <rect x="9" y="5" width="2" height="2" fill="#3b1a08"/>
  <!-- Moustache -->
  <rect x="4" y="7" width="8" height="1" fill="#3b1a08"/>
  <rect x="5" y="8" width="6" height="1" fill="#3b1a08"/>
  <!-- Body (blue overalls) -->
  <rect x="3" y="9" width="10" height="5" fill="#3b6bc4"/>
  <!-- Buttons -->
  <rect x="5" y="10" width="1" height="1" fill="#f5c07a"/>
  <rect x="10" y="10" width="1" height="1" fill="#f5c07a"/>
  <!-- Red shirt under overalls -->
  <rect x="2" y="9" width="1" height="5" fill="#e52222"/>
  <rect x="13" y="9" width="1" height="5" fill="#e52222"/>
  <!-- Shoes (brown) -->
  <rect x="3" y="14" width="4" height="2" fill="#7b3a0c"/>
  <rect x="9" y="14" width="4" height="2" fill="#7b3a0c"/>
  <!-- Belt buckle (yellow) -->
  <rect x="7" y="9" width="2" height="1" fill="#ffd700"/>
</svg>
